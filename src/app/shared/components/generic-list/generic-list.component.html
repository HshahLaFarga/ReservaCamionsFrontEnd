<div class="generic-list-container bg-white rounded-2xl shadow-xl border border-gray-100 p-6 sm:p-8 max-w-7xl mx-auto mt-4 mb-8">
  
  <!-- Buscador -->
  <div class="flex flex-col sm:flex-row justify-between items-center mb-6">
    <div class="w-full sm:w-1/2 lg:w-1/3">
      <label class="block text-sm font-semibold text-gray-700 mb-2">Cerca avançada</label>
      <div class="relative group">
        <div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none">
          <mat-icon class="text-gray-400 group-focus-within:text-blue-600 transition-colors">search</mat-icon>
        </div>
        <input type="text" (keyup)="applyFilter($event)" placeholder="Filtrar por cualquier campo..." #filterInput 
          class="w-full pl-12 pr-4 py-3 bg-gray-50/80 hover:bg-gray-100 border border-gray-200 focus:border-blue-500 focus:bg-white text-gray-800 rounded-xl outline-none focus:ring-4 focus:ring-blue-500/15 transition-all duration-300 placeholder:text-gray-400 font-medium shadow-sm">
      </div>
    </div>
  </div>

  <!-- Tabla -->
  <div class="bg-white border border-gray-200 rounded-xl overflow-hidden shadow-sm">
    <div class="overflow-x-auto">
      <table mat-table [dataSource]="dataSource" matSort class="w-full text-left border-collapse">

        <!-- Columnas dinámicas -->
        <ng-container *ngFor="let col of columns" [matColumnDef]="col.key">
          <th mat-header-cell *matHeaderCellDef mat-sort-header class="bg-gray-50/80 text-gray-700 font-bold uppercase text-xs tracking-wider py-4 px-6 border-b border-gray-200"> 
            {{ col.label }} 
          </th>
          <td mat-cell *matCellDef="let row" [innerHTML]="getNestedProperty(row, col.key)" class="py-4 px-6 text-sm text-gray-800 border-b border-gray-100"></td>
        </ng-container>

        <!-- Columna de acciones -->
        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef class="bg-gray-50/80 text-gray-700 font-bold uppercase text-xs tracking-wider py-4 px-6 border-b border-gray-200 w-32 text-right"> Accions </th>
          <td mat-cell *matCellDef="let row" class="py-4 px-6 text-sm border-b border-gray-100 text-right">
            <div class="flex items-center justify-end space-x-1">
              <button mat-icon-button color="primary" (click)="onEdit(row)" title="Editar" class="transition-transform hover:scale-110">
                <mat-icon>edit</mat-icon>
              </button>
              <button mat-icon-button color="warn" (click)="onDelete(row)" title="Esborrar" class="transition-transform hover:scale-110">
                <mat-icon>delete</mat-icon>
              </button>
            </div>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;" class="hover:bg-blue-50/40 transition-colors duration-200"></tr>

        <!-- Fila cuando no hay datos -->
        <tr class="mat-row" *matNoDataRow>
          <td class="mat-cell text-center py-12 text-gray-500 bg-gray-50/30" [attr.colspan]="displayedColumns.length">
            <div class="flex flex-col items-center justify-center space-y-3">
              <mat-icon class="text-gray-400 !w-12 !h-12 !text-5xl mb-2 items-center justify-center flex">search_off</mat-icon>
              <p class="text-lg font-medium text-gray-600">No s'han trobat resultats.</p>
            </div>
          </td>
        </tr>
      </table>
    </div>

    <!-- Paginador -->
    <div class="bg-gray-50/50 border-t border-gray-200">
      <mat-paginator [pageSizeOptions]="[10,25,50]" [pageSize]="50" showFirstLastButtons aria-label="Selecciona pàgina" class="bg-transparent text-gray-700">
      </mat-paginator>
    </div>
  </div>
</div>
