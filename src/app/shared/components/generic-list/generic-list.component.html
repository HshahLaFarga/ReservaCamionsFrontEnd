<div class="generic-list-container">
  <!-- Buscador -->
  <mat-form-field appearance="outline" class="w-full mb-2">
    <mat-label>Filtrar por cualquier campo...</mat-label>
    <input matInput (keyup)="applyFilter($event)" placeholder="Buscar..." #filterInput>
    <mat-icon matSuffix>search</mat-icon>
  </mat-form-field>

  <!-- Tabla -->
  <div class="mat-elevation-z2 overflow-x-auto">
    <table mat-table [dataSource]="dataSource" matSort class="w-full">

      <!-- Columnas dinámicas -->
      <ng-container *ngFor="let col of columns" [matColumnDef]="col.key">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> {{ col.label }} </th>
        <td mat-cell *matCellDef="let row" [innerHTML]="getNestedProperty(row, col.key)"></td>
      </ng-container>

      <!-- Columna de acciones -->
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef> Accions </th>
        <td mat-cell *matCellDef="let row">
          <button mat-icon-button color="primary" (click)="onEdit(row)" title="Editar">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button color="warn" (click)="onDelete(row)" title="Esborrar">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

      <!-- Fila cuando no hay datos -->
      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell text-center py-4" [attr.colspan]="displayedColumns.length">
          No s'han trobat resultats.
        </td>
      </tr>
    </table>

    <mat-paginator [pageSizeOptions]="[10,25,50]" [pageSize]="50" showFirstLastButtons aria-label="Selecciona pàgina">
    </mat-paginator>
  </div>
</div>
