<div class="overflow-x-auto">
  <div class="mb-4 px-4"> <input type="text" [(ngModel)]="searchTerm" placeholder="Filtrar por cualquier campo..."
      class="w-full px-3 py-2 rounded mt-1" /> </div>
  <table class="min-w-full border border-gray-200 divide-y divide-gray-200">
    <thead class="bg-gray-100">
      <tr>
        <th *ngFor="let col of columns" class="px-4 py-2 text-left text-sm font-semibold text-gray-700"> {{ col.label }}
        </th>
        <th class="px-4 py-2 text-left text-sm font-semibold text-gray-700">Accions</th>
      </tr>
    </thead>
    <tbody class="bg-white divide-y divide-gray-200">
      <tr *ngFor="let item of paginatedItems" class="hover:bg-gray-50">
        <td *ngFor="let col of columns" class="px-4 py-2 text-sm text-gray-800"
          [innerHTML]="getNestedProperty(item, col.key)"> </td>
        <td class="px-4 py-2 text-sm text-gray-800 space-x-2"> <button (click)="onEdit(item)" title="Editar"
            class="text-blue-600 hover:text-blue-800 focus:outline-none material-icons align-middle"> edit </button>
          <button (click)="onDelete(item)" title="Esborrar"
            class="text-red-600 hover:text-red-800 focus:outline-none material-icons align-middle"> delete </button>
        </td>
      </tr>
    </tbody>
  </table>
  <div class="flex justify-between items-center mt-4 px-4">
    <div class="text-sm text-gray-600"> Pàgina {{ currentPage }} de {{ totalPages }} </div>
    <div class="space-x-1"> <button (click)="goToPage(currentPage - 1)" [disabled]="currentPage === 1"
        class="px-2 py-1 text-sm border rounded disabled:opacity-50"> Anterior </button> <ng-container
        *ngFor="let page of [].constructor(totalPages); let i = index"> <button (click)="goToPage(i + 1)"
          [class.bg-blue-100]="currentPage === i + 1" class="px-2 py-1 text-sm border rounded"> {{ i + 1 }} </button>
      </ng-container> <button (click)="goToPage(currentPage + 1)" [disabled]="currentPage === totalPages"
        class="px-2 py-1 text-sm border rounded disabled:opacity-50"> Següent </button> </div>
  </div>
</div>
