<!-- Menú lateral móvil (off-canvas) -->
<div
  *ngIf="mobileSidebarOpen"
  class="fixed inset-0 bg-black bg-opacity-50 z-40"
  (click)="toggleMobileSidebar()"
></div>

<aside
  *ngIf="mobileSidebarOpen"
  class="fixed top-0 left-0 w-64 h-full bg-gray-900 text-white p-6 z-50 shadow-lg lg:hidden"
>
  <button (click)="toggleMobileSidebar()" class="text-white absolute top-4 right-4">
    <span class="material-icons">exit_to_app</span>
  </button>
  <ul class="mt-10 space-y-4">
    <ng-container *ngFor="let item of sidebarItems; let last = last">
      <li>
        <a
          [routerLink]="item.route"
          routerLinkActive="bg-blue-600 shadow-md scale-[1.02] rounded px-3 py-2 block"
          [routerLinkActiveOptions]="{ exact: true }"
          class="transition-all duration-300 ease-in-out hover:shadow-lg hover:scale-[1.05] rounded px-3 py-2 block">
          {{ item.label | translate }}
        </a>
      </li>
      <div *ngIf="!last" class="border-t border-gray-600 w-full mx-auto opacity-40"></div>
    </ng-container>
  </ul>
</aside>
