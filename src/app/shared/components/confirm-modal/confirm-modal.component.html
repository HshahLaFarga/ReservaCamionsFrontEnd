<!-- confirm-modal.component.html -->
<div class="fixed inset-0 bg-black/30 flex items-center justify-center z-50">
  <div class="bg-white rounded-lg shadow-xl max-w-sm w-full p-6">
    <h2 class="text-xl font-semibold mb-4">{{ data.title }}</h2>
    <p class="text-gray-700 mb-6" [innerHTML]="data.message"></p>
    <div class="flex justify-end gap-2">
      <button class="px-4 py-2 bg-gray-200 rounded" (click)="onCancel()">
        {{ data.cancelText || 'Cancel·lar' }}
      </button>
      <button class="px-4 py-2 bg-red-600 text-white rounded" (click)="onConfirm()">
        {{ data.confirmText || 'Acceptar' }}
      </button>
    </div>
  </div>
</div>
