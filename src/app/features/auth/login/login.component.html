<div class="max-w-md mx-auto mt-20 p-6 border rounded shadow">
  <h2 class="text-2xl mb-6 text-center">Login</h2>

  <form (ngSubmit)="onSubmit()" #loginForm="ngForm" novalidate>
    <div class="mb-4">
      <label for="email" class="block mb-1 font-semibold">Email</label>
      <input
        type="email"
        id="email"
        name="email"
        [(ngModel)]="email"
        required
        email
        class="w-full border px-3 py-2 rounded"
        #emailInput="ngModel"
      />
      <div *ngIf="emailInput.invalid && emailInput.touched" class="text-red-600 text-sm">
        Email inválido o requerido.
      </div>
    </div>

    <div class="mb-4">
      <label for="password" class="block mb-1 font-semibold">Contraseña</label>
      <input
        type="password"
        id="password"
        name="password"
        [(ngModel)]="password"
        required
        minlength="6"
        class="w-full border px-3 py-2 rounded"
        #passwordInput="ngModel"
      />
      <div *ngIf="passwordInput.invalid && passwordInput.touched" class="text-red-600 text-sm">
        La contraseña debe tener al menos 6 caracteres.
      </div>
    </div>

    <button
      type="submit"
      [disabled]="loginForm.invalid || loading"
      class="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700 disabled:opacity-50"
    >
      {{ loading ? 'Entrando...' : 'Entrar' }}
    </button>

    <div *ngIf="errorMessage" class="mt-4 text-red-600 text-center">
      {{ errorMessage }}
    </div>
  </form>
</div>
