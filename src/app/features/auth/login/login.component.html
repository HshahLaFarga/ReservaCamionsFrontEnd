<div class="h-screen w-screen flex items-center justify-center
            bg-gradient-to-br from-[#FE7354]/20 to-[#00D5CD]/20">

  <div class="w-full max-w-md p-8 bg-white/90 backdrop-blur-sm rounded-2xl shadow-lg border border-white/20">

    <h2 class="text-3xl font-bold mb-6 text-center bg-gradient-to-r 
               from-[#FE7354] to-[#00D5CD] bg-clip-text text-transparent">
      Login
    </h2>

    <form (ngSubmit)="onSubmit()" #loginForm="ngForm" novalidate>

      <!-- Email -->
      <div class="mb-5">
        <label for="email" class="block mb-1 font-semibold text-gray-700">Usuario</label>
        <input
          type="text"
          id="email"
          name="email"
          [(ngModel)]="email"
          required
          class="w-full px-4 py-3 rounded-lg border border-gray-300 
                 focus:outline-none focus:ring-2 focus:ring-[#00D5CD] 
                 focus:border-transparent transition-all shadow-sm bg-white"
          #emailInput="ngModel"
        />
        <div
          *ngIf="emailInput.invalid && emailInput.touched"
          class="text-[#FE7354] text-sm mt-1"
        >
          Email inválido o requerido.
        </div>
      </div>

      <!-- Contraseña -->
      <div class="mb-5">
        <label for="password" class="block mb-1 font-semibold text-gray-700">
          Contraseña
        </label>
        <input
          type="password"
          id="password"
          name="password"
          [(ngModel)]="password"
          required
          class="w-full px-4 py-3 rounded-lg border border-gray-300
                 focus:outline-none focus:ring-2 focus:ring-[#00D5CD] 
                 focus:border-transparent transition-all shadow-sm bg-white"
          #passwordInput="ngModel"
        />
        <div
          *ngIf="passwordInput.invalid && passwordInput.touched"
          class="text-[#FE7354] text-sm mt-1"
        >
          La contraseña debe tener al menos 6 caracteres.
        </div>
      </div>

      <!-- Botón -->
      <button
        type="submit"
        [disabled]="loginForm.invalid || loading"
        class="w-full py-3 rounded-lg text-white font-semibold shadow-md
               bg-gradient-to-r from-[#FE7354] to-[#00D5CD]
               hover:opacity-90 transition disabled:opacity-50"
      >
        {{ loading ? 'Entrando...' : 'Entrar' }}
      </button>
