<div class="flex flex-col overflow-y-auto bg-gradient-to-br p-4 items-center">
  <form [formGroup]="form" (ngSubmit)="updateUser()" class="max-w-lg w-full font-sans space-y-6">
    <h2 class="text-2xl font-extrabold text-gray-800 mb-6">
      {{ 'USER_PAGE.TITLE' | translate }}
    </h2>

    <div>
      <label for="name" class="block mb-1 text-gray-700">
        {{ 'FORM.CONTACT_NAME' | translate }}
      </label>
      <input id="name" type="text" formControlName="name"
        class="w-full p-2 bg-transparent border-b border-gray-400 focus:outline-none focus:ring-0 focus:border-blue-500 transition" />
    </div>

    <div>
      <label for="email" class="block mb-1 text-gray-700">
        {{ 'FORM.EMAIL' | translate }}
      </label>
      <input id="email" type="email" formControlName="email"
        class="w-full p-2 bg-transparent border-b border-gray-400 focus:outline-none focus:ring-0 focus:border-blue-500 transition" />
    </div>

    <div>
      <label for="pin" class="block mb-1 text-gray-700">
        {{ 'FORM.PIN' | translate }}
      </label>
      <input id="pin" type="password" formControlName="pin"
        class="w-full p-2 bg-transparent border-b border-gray-400 focus:outline-none focus:ring-0 focus:border-blue-500 transition" />
    </div>

    <div>
      <label for="tel1" class="block mb-1 text-gray-700">
        {{ 'FORM.TEL1' | translate }}
      </label>
      <input id="tel1" type="tel" formControlName="tel1"
        class="w-full p-2 bg-transparent border-b border-gray-400 focus:outline-none focus:ring-0 focus:border-blue-500 transition" />
    </div>

    <div>
      <label for="password" class="block mb-1 text-gray-700">
        {{ 'FORM.PASSWORD' | translate }}
      </label>
      <input id="password" type="password" formControlName="password"
        class="w-full p-2 bg-transparent border-b border-gray-400 focus:outline-none focus:ring-0 focus:border-blue-500 transition" />
    </div>

    <button type="submit"
    class="py-2 px-6 bg-blue-600 text-white font-semibold rounded-lg shadow-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-400 focus:ring-opacity-75 transition duration-300">
      {{ 'FORM.SUBMIT' | translate }}
    </button>

  </form>
</div>
