<app-generic-form *ngIf="method === 'update'"
  formTitle="Editar Transportista"
  tableName="transportes"
  [selectFields]="{
    proveedor_id: { api: 'proveedores', labelField: 'nombre', valueField: 'proveedor_id', label: 'Proveedor' }
  }"
  [excludedFields]="['created_at','updated_at']"
  [initialData]="initialCarrierData"
  (submitForm)="onSubmit($event)">
</app-generic-form>

<app-generic-form *ngIf="method === 'post'"
  formTitle="Añadir Transportista"
  tableName="transportes"
  [selectFields]="{
    proveedor_id: { api: 'proveedores', labelField: 'nombre', valueField: 'proveedor_id', label: 'Proveedor' }
  }"
  [excludedFields]="['created_at','updated_at']"
  (submitForm)="onSubmit($event)">
</app-generic-form>

<div *ngIf="isLoading" class="absolute inset-0 bg-white/60 flex items-center justify-center z-20">
  <div class="flex text-center items-center gap-3">
    <div class="loader animate-spin h-8 w-8 border-4 border-blue-500 border-t-transparent rounded-full mb-2"></div>
    <p class="text-gray-700">Carregant...</p>
  </div>
</div>
