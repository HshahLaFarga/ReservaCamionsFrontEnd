
<div class="flex items-center justify-start mb-4 gap-6">
  <h1 class="text-2xl font-bold mb-4">Listado Proveedores</h1>
  <button
    (click)="onAdd()"
    class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded"
  >
    Añadir Proveedor
  </button>
</div>

<app-generic-list
  [items]="providers"
  [columns]="columns"
  (edit)="onEdit($event)"
  (delete)="onDelete($event)">
</app-generic-list>
