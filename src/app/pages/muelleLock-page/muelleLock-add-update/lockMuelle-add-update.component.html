<app-generic-form *ngIf="method === 'update'" formTitle="Editar Bloqueo Muelles" tableName="bloqueo_muelles"
  [selectFields]="{
    muelle_id: { api: 'muelles', labelField: 'nombre', valueField: 'muelle_id', label: 'Muelle' }
  }" [excludedFields]="['bloqueo_muelle_id', 'created_at', 'updated_at']" [optionalFields]="['muelle_id']"
  [initialData]="initialLockMuelleData" (submitForm)="onSubmit($event)">
</app-generic-form>

<app-generic-form *ngIf="method === 'post'" formTitle="Añadir Bloqueo Muelles" tableName="bloqueo_muelles"
  [selectFields]="{
    muelle_id: { api: 'muelles', labelField: 'nombre', valueField: 'muelle_id', label: 'Muelle' }
  }" [excludedFields]="['bloqueo_muelle_id', 'created_at', 'updated_at']" [optionalFields]="['muelle_id']"
  (submitForm)="onSubmit($event)">
</app-generic-form>

<div *ngIf="isLoading" class="absolute inset-0 bg-white/60 flex items-center justify-center z-20">
  <div class="flex text-center items-center gap-3">
    <div class="loader animate-spin h-8 w-8 border-4 border-blue-500 border-t-transparent rounded-full mb-2"></div>
    <p class="text-gray-700">Carregant...</p>
  </div>
</div>
