  <h1 class="text-2xl font-bold mb-4">Generar informes de reservas</h1>

  <div class="bg-white p-4 rounded shadow max-w-lg">
    <h2 class="text-lg font-medium mb-4">Selecciona les dates</h2>
    <div class="flex gap-4">
        <mat-form-field>
            <mat-label>Desde</mat-label>
            <input matInput [matDatepicker]="picker" [(ngModel)]="from">
            <mat-hint>MM/DD/YYYY</mat-hint>
            <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
            <mat-datepicker #picker></mat-datepicker>
        </mat-form-field>
        <mat-form-field>
            <mat-label>Hasta</mat-label>
            <input matInput [matDatepicker]="picker2" [(ngModel)]="to">
            <mat-hint>MM/DD/YYYY</mat-hint>
            <mat-datepicker-toggle matIconSuffix [for]="picker2"></mat-datepicker-toggle>
            <mat-datepicker #picker2></mat-datepicker>
        </mat-form-field>
    </div>
    <button class="mt-4 bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded justify-end"
      (click)="generateReport()">
        Generar Informe
    </button>
  </div>
  <div
  *ngIf="isLoading"
  class="absolute inset-0 bg-white/60 flex items-center justify-center z-20"
>
  <div class="flex text-center items-center gap-3">
    <div class="loader animate-spin h-8 w-8 border-4 border-blue-500 border-t-transparent rounded-full mb-2"></div>
    <p class="text-gray-700">Carregant...</p>
  </div>
</div>
